<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />

    {% if title %}
    <title>{{title}}</title>
    {% else %}
    <title>iQGenerator</title>
    {% endif %}

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='bootstrap-3.3.7/css/bootstrap.min.css') }}"
    />

    <script src="{{ url_for('static', filename='jQuery/jquery-3.3.1.min.js') }}"></script>

    <link
      rel="stylesheet"
      type="text/css"
      href="{{ url_for('static', filename='css/main.css') }}"
    />
  </head>

  <body>
    <nav class="navbar">
      <div class="container">
        <div class="navbar-header">
          <button
            type="button"
            class="navbar-toggle"
            data-toggle="collapse"
            data-target="#myNavbar"
          >
            <span class="icon-bar"></span>
            <span class="icon-bar"></span>
            <span class="icon-bar"></span>
          </button>
          <div style="max-width: 100px">
            <a href="/"
              ><img
                src="{{ url_for('static', filename='images/logoimg.png') }}"
                style="width: 55%"
            /></a>
          </div>
        </div>
        <div class="one-navbar collapse navbar-collapse" id="myNavbar">
          <ul id="drop" class="nav one-navbar navbar-nav navbar-right">
            <li>
              <a href="/"
                ><span class="glyphicon glyphicon-home"></span> Home</a
              >
            </li>
            <li>
              <a href="/TutorialList"
                ><span class="glyphicon glyphicon-list-alt"></span> Learn
              </a>
            </li>
            <li>
              <a href="/HowItWorks"
                ><span class="glyphicon glyphicon-transfer"></span> How It
                Works</a
              >
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div style="padding-top: 72px">{% block content %}{% endblock %}</div>
  </body>
</html>
